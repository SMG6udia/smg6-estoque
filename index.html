<style>

  *{box-sizing:border-box;margin:0;padding:0}

  .stat.green{border-left-color:var(--green)}.stat.red{border-left-color:var(--red)}.stat.amber{border-left-color:var(--amber)}
  .stat .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-faint);font-weight:600}
  .stat .v{font-family:var(--disp);font-weight:800;font-size:27px;margin-top:5px}

  .toast.ok{border-left-color:var(--green)}.toast.erro{border-left-color:var(--red)}.toast.warn{border-left-color:var(--amber)}
  @keyframes sl{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
  .loading{padding:50px;text-align:center;color:var(--txt-faint);font-family:var(--mono);letter-spacing:.1em}
  .colab-select-wrap{padding:14px 16px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:12px;flex-wrap:wrap}

  .colab-select-wrap select:focus{outline:none;border-color:var(--blue)}
</style>

<script>
/* ================= CONFIG ================= */
const SETORES={

    "Elástico de cabelo":{tamanhos:["Único"],cores:[],un:"UN"}
  },
  insumos:{
    "Papel Sulfite":{tamanhos:[],cores:["Branco","Verde","Azul","Amarelo","Rosa","Reciclado"],un:"Resma"},
    "Etiquetas Adesivas":{tamanhos:[],cores:["PS","Branco","Verde","Azul","Rosa","Amarelo"],un:"Rolo"},
    "Pincel para Quadro":{tamanhos:[],cores:["Preto","Azul","Vermelho","Verde"],un:"UN"},
    "Ribbon":{tamanhos:[],cores:[],un:"Rolo"},
    "Removedor de Cola":{tamanhos:[],cores:[],un:"UN"}
  }
};
const COR_HEX={Branco:"#f5f5f5",Verde:"#2faa55",Azul:"#2f6fdb",Amarelo:"#f2c80f",Rosa:"#e85f9c",Reciclado:"#cbb994",Preto:"#222",Vermelho:"#d23b30",PS:"#9aa3b0"};
const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MESES_FULL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const ALERTA_DIAS=15;
/* ── Google Sheets / Apps Script ── */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz06z3Q_KpH8giYDEasIIvff6I3aAYCKvDPHLx6fj4dQl3OME8zgbWupCpwSetUMYINaQ/exec"; // linha 192 — cole a URL do Apps Script da conta @gmail.com
const DRIVE_FOLDER_EPI = "1xIq3muw068guiHAPAEe17NA_pyjUTpPg";
let   DRIVE_STATUS = "idle";

/* ── API Helper via JSONP ──
   Domínios Google Workspace bloqueiam fetch cross-origin mesmo com "Qualquer pessoa".
   JSONP contorna isso injetando uma <script> tag — funciona em qualquer domínio. */
function api(action, payload, silent) {
  return new Promise(function(resolve) {
    const token = sessionStorage.getItem("smg6_token");
    if (!silent) driveSetStatus("syncing");

    // Nome único para o callback
    const cbName = "__smg6cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);

    // Timeout de 20 segundos
    const timeout = setTimeout(function() {
      cleanup();
      if (!silent) driveSetStatus("error");
      resolve({ ok: false, error: "Tempo esgotado. Verifique a conexão e a URL do Apps Script." });
    }, 20000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
    }

    // Registrar callback global que o Apps Script vai chamar
    window[cbName] = function(data) {
      cleanup();
      if (!silent) driveSetStatus(data && data.ok ? "ok" : "error");
      resolve(data || { ok: false, error: "Resposta vazia do servidor." });
    };

    // Montar URL com payload + callback
    const body = { action: action, token: token, payload: payload };
    const encoded = encodeURIComponent(JSON.stringify(body));
    const url = APPS_SCRIPT_URL + "?callback=" + cbName + "&payload=" + encoded;

    // Injetar script tag
    const script = document.createElement("script");
    script.id = cbName;
    script.src = url;
    script.onerror = function() {
      cleanup();
      if (!silent) driveSetStatus("error");
      resolve({ ok: false, error: "Erro ao conectar. Verifique se a implantação está ativa e acessível." });
    };
    document.head.appendChild(script);
  });
}

/* ── Auth helpers ── */
function getToken(){ return sessionStorage.getItem("smg6_token"); }
function getUser(){
  try{ return JSON.parse(sessionStorage.getItem("smg6_user")||"null"); }catch(e){return null;}
}
function setSession(token, user){
  sessionStorage.setItem("smg6_token", token);
  sessionStorage.setItem("smg6_user", JSON.stringify(user));
}
function clearSession(){
  sessionStorage.removeItem("smg6_token");
  sessionStorage.removeItem("smg6_user");
}
function canEdit(){ const u=getUser(); return u&&(u.nivel==="admin"||u.nivel==="operador"); }
function isAdmin(){ const u=getUser(); return u&&u.nivel==="admin"; }

const movOf=pid=>MOVS.filter(m=>m.produtoId===pid);
function selProd(){return PRODUTOS.find(p=>p.id===state.sel)||null;}
function atual(pid){return movOf(pid).reduce((s,m)=>s+(m.tipo==="entrada"?m.qtd:-m.qtd),0);}
function saldoVar(pid,tam,cor){return movOf(pid).filter(m=>(m.tamanho||"")===(tam||"")&&(m.cor||"")===(cor||"")).reduce((s,m)=>s+(m.tipo==="entrada"?m.qtd:-m.qtd),0);}
function custoUnit(pid){const e=movOf(pid).filter(m=>m.tipo==="entrada"&&m.custoUnit>0);return e.length?e[e.length-1].custoUnit:0;}
function corDot(c){if(!c)return"";return`<span class="cdot" style="background:${COR_HEX[c]||"#bbb"}"></span>`;}
function colabListaAtivos(dom){
  const fromMovs=[...new Set(MOVS.filter(m=>m.tipo==="saida"&&m.dom===dom).map(m=>m.parte))].filter(Boolean);
  const fromPlanilha=dom==="safety"?COLAB_PLANILHA_ATIVOS:[];
  return [...new Set([...fromPlanilha,...fromMovs])].filter(n=>!DESLIGADOS.includes(n)).sort((a,b)=>a.localeCompare(b,"pt-BR"));
}
function mesLabel(ym){const[y,m]=ym.split("-");return MESES[Number(m)-1]+"/"+y;}
function monthRange(ym){const[y,m]=ym.split("-").map(Number);const last=new Date(y,m,0).getDate();return{start:`${ym}-01`,end:`${ym}-${String(last).padStart(2,"0")}`};}
function yearRange(y){return{start:`${y}-01-01`,end:`${y}-12-31`};}
function weekOfYear(dateStr){const d=new Date(dateStr);const start=new Date(d.getFullYear(),0,1);return Math.ceil(((d-start)/86400000+start.getDay()+1)/7);}
function weeksInYear(y){const allWeeks=[];let d=new Date(y,0,1);while(d.getFullYear()===y){const w=weekOfYear(d.toISOString().slice(0,10));if(!allWeeks.find(x=>x.w===w)){const monday=new Date(d);const sunday=new Date(d);sunday.setDate(sunday.getDate()+(6-sunday.getDay()));if(sunday.getFullYear()>y)sunday.setFullYear(y,11,31);allWeeks.push({w,label:`W${String(w).padStart(2,"0")}`,start:monday.toISOString().slice(0,10),end:sunday.toISOString().slice(0,10)});}d.setDate(d.getDate()+1);}return allWeeks;}
function aggregate(dom,start,end){const ent=MOVS.filter(m=>m.tipo==="entrada"&&m.dom===dom&&m.data>=start&&m.data<=end);const sai=MOVS.filter(m=>m.tipo==="saida"&&m.dom===dom&&m.data>=start&&m.data<=end);return{ent,sai,qtdEnt:ent.reduce((s,e)=>s+e.qtd,0),qtdSai:sai.reduce((s,e)=>s+e.qtd,0),valEnt:ent.reduce((s,e)=>s+e.qtd*(e.custoUnit||0),0)};}

function driveSetStatus(s){
  DRIVE_STATUS=s;
  var dot=document.getElementById("drive-dot"),lbl=document.getElementById("drive-lbl");
  if(!dot||!lbl)return;
  var map={idle:["#8b94a3","Sheets"],syncing:["#f0a500","Salvando…"],ok:["#1f9d55","Sheets ✓"],error:["#d23b30","Sheets ✗"]};
  var m=map[s]||map.idle;
  dot.style.background=m[0];lbl.textContent=m[1];
}

/* ================= LOGIN ================= */
function showLogin(){
  document.getElementById("app").style.display="none";
  var ls=document.getElementById("login-screen");
  if(ls) ls.style.display="flex";
  // Verificar se URL do Apps Script está configurada
  var warn=document.getElementById("li_cfg_warn");
  if(warn) warn.style.display=(APPS_SCRIPT_URL==="COLE_A_URL_DO_APPS_SCRIPT_AQUI")?"block":"none";
  // Focar no campo email
  setTimeout(function(){
    var em=document.getElementById("li_email"); if(em) em.focus();
  },100);
  // Enter nos campos
  ["li_email","li_senha"].forEach(function(id){
    var el=document.getElementById(id);
    if(el && !el._hasEnter){
      el._hasEnter=true;
      el.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
    }
  });
}

async function loadAll(){
  driveSetStatus("syncing");
  const r = await api("getAll", null, true);
  if(!r.ok){
    driveSetStatus("error");
    toast("Erro ao carregar dados: "+(r.error||"verifique a conexão"),"erro");
    return false;
  }
  PRODUTOS   = r.produtos   || [];
  MOVS       = r.movs       || [];
  DESLIGADOS = r.desligados || [];
  driveSetStatus("ok");
  return true;
}

async function doLogin(){
  var email=(document.getElementById("li_email")||{}).value||"";
  var senha=(document.getElementById("li_senha")||{}).value||"";
  var err=document.getElementById("li_err");
  var btn=document.getElementById("li_btn");
  if(!email||!senha){if(err)err.textContent="Preencha e-mail e senha.";return;}
  if(btn){btn.disabled=true;btn.textContent="Entrando…";}
  if(err)err.textContent="";

  // URL configurada

  const r=await api("login",{email,senha},true);
  if(btn){btn.disabled=false;btn.textContent="Entrar";}
  if(!r.ok){if(err)err.textContent=r.error||"Erro ao fazer login.";return;}
  setSession(r.token,r.user);
  var ls=document.getElementById("login-screen");
  if(ls)ls.style.display="none";
  var appEl=document.getElementById("app");
  if(appEl)appEl.style.display="";
  // Atualizar header com usuário logado
  var saveEl=document.getElementById("save");
  if(saveEl)saveEl.textContent=r.user.nome||r.user.email;
  document.getElementById("main").innerHTML='<div class="loading">Carregando dados…</div>';
  const loadOk = await loadAll();
  await loadPins();
  state.view="estoque";
  state.sel=null;
  state.colab=null;
  state.rep="semana";
  state.repYear=Number(today().slice(0,4));
  state.repWeek=weekOfYear(today());
  state.repMonth=today().slice(0,7);
  state.repStart=today().slice(0,8)+"01";
  state.repEnd=today();
  if(window._postLoginHook) window._postLoginHook();
  render();
  // Verificar primeiro acesso — solicitar troca de senha
  if(r.primeiroAcesso){
    setTimeout(function(){showPrimeiroAcesso();},600);
  }
}

function doLogout(){
  clearSession();
  PRODUTOS=[];MOVS=[];DESLIGADOS=[];
  document.getElementById("app").style.display="none";
  var ls=document.getElementById("login-screen");
  if(ls){ls.style.display="flex";}
  var em=document.getElementById("li_email");if(em)em.value="";
  var sn=document.getElementById("li_senha");if(sn)sn.value="";
  var er=document.getElementById("li_err");if(er)er.textContent="";
  showLogin();
}

/* ================= ROUTER ================= */
function render(){
  try{
    document.querySelectorAll(".dom-tab").forEach(b=>b.classList.toggle("active",b.dataset.dom===state.dom));
    const isInsumos=state.dom==="insumos";
    const menuColab=document.getElementById("menuColab");
    const menuDesl=document.getElementById("menuDesl");
    if(menuColab)menuColab.style.display=isInsumos?"none":"";
    if(menuDesl)menuDesl.style.display=isInsumos?"none":"";
    if(isInsumos&&(state.view==="colaboradores"||state.view==="desligados"))state.view="estoque";
    document.querySelectorAll("#menu button").forEach(b=>b.classList.toggle("active",b.dataset.view===state.view));
    const m=document.getElementById("main");
    if(!m)return;
    let html="";
    try{
      if(state.view==="estoque")            html=viewEstoque();
      else if(state.view==="colaboradores") html=state.colab?viewColabDet():viewColabList();
      else if(state.view==="desligados")    html=viewDesligados();
      else if(state.view==="relatorios")    html=viewRel();
      else if(state.view==="usuarios")      { viewUsuariosPanel(); return; }
    }catch(viewErr){
      html='<div style="padding:30px;color:var(--red);font-family:var(--mono);font-size:13px">'
          +'<b>Erro ao renderizar:</b> '+viewErr.message
          +'<br><br><button class="btn ghost sm" onclick="render()">Tentar novamente</button></div>';
      console.error("viewErr:",viewErr);
    }
    m.innerHTML=html||'<div class="empty">Sem conteúdo.</div>';
    wire();
  }catch(e){
    console.error("render erro:",e);
  }
}

/* ================= ESTOQUE ================= */
function viewEstoque(){
  const dom=state.dom;
  if(!dom){return '<div class="empty">Domínio não definido.</div>';}
  const prods=(prodOf(dom)||[]).slice().sort((a,b)=>a.descricao.localeCompare(b.descricao,"pt-BR"));
  const sel=selProd();
  const showSaida=dom==="insumos";
  // Mostrar apenas descrição
  const prodOpts=prods.length
    ?`<option value="">— Todos os itens —</option>`+prods.map(p=>`<option value="${p.id}" ${state.sel===p.id?"selected":""}>${esc(p.descricao)}</option>`).join("")

      <td>${mv.tamanho?`<span class="chip tam">${esc(mv.tamanho)}</span>`:"—"}</td>
      <td>${mv.cor?corDot(mv.cor)+esc(mv.cor):"—"}</td>
      <td class="num ${mv.tipo==='entrada'?'qpos':'qneg'}">${mv.tipo==="entrada"?"+":"−"}${mv.qtd}</td>

      <div class="tot"><span class="l">Custo Total do Estoque</span><span class="v blue">${brl(at*cu)}</span></div>
      <div class="tot"><span class="l">Custo Atual da Unidade</span><span class="v">${brl(cu)}</span></div></div>`;
  }else{
    // Mostrar todos itens com saldo
    const todosProd=prods.map(p=>({p,saldo:atual(p.id)}));
    const resumoRows=todosProd.map(({p,saldo})=>{
      const cu=custoUnit(p.id);
      return `<tr>
        <td><b>${esc(p.descricao)}</b></td>
        <td>${esc(p.setor||"")}</td>
        <td class="num ${saldo<=0?'qneg':'qpos'}">${saldo}</td>
        <td class="num">${brl(cu)}</td>
        <td class="num">${brl(saldo*cu)}</td>

    detRows=resumoRows;
    totals=`<div class="totals">
      <div class="tot"><span class="l">Total de Produtos</span><span class="v">${prods.length}</span></div>
      <div class="tot"><span class="l">Itens em Estoque</span><span class="v green">${todosProd.reduce((s,x)=>s+(x.saldo>0?x.saldo:0),0)}</span></div>
      <div class="tot"><span class="l">Valor Total Estimado</span><span class="v blue">${brl(todosProd.reduce((s,{p,saldo})=>s+saldo*custoUnit(p.id),0))}</span></div></div>`;

    ?`<thead><tr><th>Data</th><th>Tipo</th><th>${dom==="safety"?"Colaborador / Fornecedor":"Destino / Fornecedor"}</th><th>Tamanho</th><th>Cor</th><th class="num">Qtde.</th><th class="num">Custo</th><th>Observações</th><th></th></tr></thead>`
    :`<thead><tr><th>Produto</th><th>Tipo/Modelo</th><th class="num">Saldo</th><th class="num">Custo Unit.</th><th class="num">Valor Total</th></tr></thead>`;

  <div class="panel detail">
    <div class="panel-bar"><h3>${sel?"Movimentações":"Resumo de Estoque"}</h3>${hasSel?`<div class="right"><span style="font-size:12px;color:var(--txt-faint)">${esc(sel.descricao)}</span></div>`:""}</div>
    <div class="scroll-y"><table>${tableHeader}<tbody>${detRows}</tbody></table></div>
  </div>
  ${totals}`;
}

/* ================= COLABORADORES ================= */
function viewColabList(){
  const dom=state.dom;
  const btn=dom==="safety"?`<button class="btn primary sm" data-act="novaEntrega">＋ Nova Entrega de EPI</button>`:"";
  const ativos=colabListaAtivos(dom);

  // Stats movimentações por colaborador
  const statsMap={};
  MOVS.filter(m=>m.tipo==="saida"&&m.dom===dom).forEach(m=>{
    const k=m.parte;if(!k)return;
    if(!statsMap[k])statsMap[k]={itens:0,reg:0,ultima:null};
    statsMap[k].itens+=m.qtd;statsMap[k].reg++;
    if(!statsMap[k].ultima||m.data>statsMap[k].ultima)statsMap[k].ultima=m.data;
  });

  const colabSel=state.colab||"";
  const selectHtml=`<div class="colab-select-wrap">
    <label style="font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--txt-faint);font-weight:600">Colaborador</label>
    <select id="colabDropdown">
      <option value="">— Selecione um colaborador —</option>
      ${ativos.map(n=>`<option value="${esc(n)}" ${colabSel===n?"selected":""}>${esc(n)}</option>`).join("")}
    </select>
  </div>`;

  if(colabSel && ativos.includes(colabSel)){
    const stats=statsMap[colabSel]||{itens:0,reg:0,ultima:null};
    const reg=MOVS.filter(m=>m.tipo==="saida"&&m.dom===dom&&m.parte===colabSel).sort((a,b)=>b.data>a.data?1:-1);
    const total=reg.reduce((s,r)=>s+r.qtd,0);
    const porProd={};
    reg.forEach(r=>{const p=PRODUTOS.find(x=>x.id===r.produtoId);const n=p?p.descricao:r.produtoId;porProd[n]=(porProd[n]||0)+r.qtd;});
    const rows=reg.map(r=>{
      const p=PRODUTOS.find(x=>x.id===r.produtoId);
      const ant=reg.filter(x=>x.produtoId===r.produtoId&&x.data<r.data).sort((a,b)=>b.data>a.data?1:-1)[0];
      const d=ant?days(ant.data,r.data):null;
      const flag=(d!==null&&d<ALERTA_DIAS)?`<span class="chip warn" title="Intervalo de ${d} dias">⚠ ${d}d</span>`:"";
      var reciboBtn=r.temRecibo?'<button class="icon-btn" title="Ver Comprovante de Entrega" onclick="reemitirRecibo(\''+r.id+'\')">&#128196;</button>':'';
      return '<tr><td class="num">'+fmtD(r.data)+'</td><td><b>'+esc(p?p.descricao:"?")+'</b></td>'
        +'<td>'+(r.tamanho?'<span class="chip tam">'+esc(r.tamanho)+'</span>':(r.cor?corDot(r.cor)+esc(r.cor):"—"))+'</td>'
        +'<td class="num">'+r.qtd+'</td><td>'+esc(r.liberadoPor||"")+' '+flag+'</td>'
        +'<td class="num" style="display:flex;gap:4px;justify-content:flex-end">'+reciboBtn+'<button class="icon-btn del" title="Excluir" data-delmov="'+r.id+'">&#128465;</button></td></tr>';
    }).join("");
    const chips=Object.entries(porProd).sort((a,b)=>b[1]-a[1]).map(([p,q])=>`<span class="chip tam" style="margin:3px">${esc(p)}: <b>${q}</b></span>`).join("");
    const btnDesl=dom==="safety"?`<button class="btn danger sm" onclick="desligarColab('${esc(colabSel)}')">⚠ Desligar Colaborador</button>`:"";
    return `<div class="panel">
      <div class="panel-bar"><h3>Colaboradores · ${dom==="safety"?"Safety":"Insumos"}</h3><div class="right">${btn}</div></div>
      ${selectHtml}
      <div class="colab-det">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-family:var(--disp);font-weight:800;font-size:20px">${esc(colabSel)}</div>
            <div style="font-size:12px;color:var(--txt-dim);margin-top:3px"><b>${reg.length}</b> ${dom==="safety"?"entregas":"retiradas"} · <b>${total}</b> itens · última: <b>${fmtD(stats.ultima)}</b></div>
          </div>
          ${btnDesl}
        </div>
        <div style="margin-top:10px">${chips||`<span style="color:var(--txt-faint)">Sem registros</span>`}</div>
      </div>
      <div class="scroll-y" style="max-height:380px"><table>
        <thead><tr><th>Data</th><th>Produto</th><th>Tam./Cor</th><th class="num">Qtd</th><th>Liberado por</th><th></th></tr></thead>
        <tbody>${rows||`<tr><td colspan="6"><div class="empty">Sem registros.</div></td></tr>`}</tbody>
      </table></div>
    </div>`;
  }

  // Sem colaborador selecionado
  return `<div class="panel">
    <div class="panel-bar"><h3>Colaboradores · ${dom==="safety"?"Safety":"Insumos"}</h3><div class="right">${btn}</div></div>
    ${selectHtml}
    <div class="empty"><div class="big">☻</div>Selecione um colaborador para ver o relatório.</div>
  </div>`;
}

        <div style="font-family:var(--disp);font-weight:800;font-size:20px">${esc(histSel)}</div>

  </tr>`).join("") || `<tr><td colspan="4"><div class="empty">Nenhum desligado registrado.</div></td></tr>`;
  return `<div class="panel">
    <div class="panel-bar"><h3>Colaboradores Desligados</h3></div>
    <div class="scroll-y"><table>
      <thead><tr><th>Nome</th><th>Status</th><th class="num">Registros</th><th>Ação</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>

}

async function desligarColab(nome){
  const ok=await confirmModal("Desligar Colaborador",`Mover <b>${esc(nome)}</b> para a lista de desligados? O histórico será preservado.`,"Desligar");
  if(!ok)return;
  if(!DESLIGADOS.includes(nome)){DESLIGADOS.push(nome);}
  await persistDesl(nome);
  state.colab=null;
  toast(`${nome} movido para Desligados.`,"warn");render();
}

function viewRel(){
  const dom=state.dom;
  const todayStr=today();
  const curYear=Number(todayStr.slice(0,4));
  if(!state.repYear)state.repYear=curYear;
  if(!state.repMonth)state.repMonth=todayStr.slice(0,7);

  let start,end,breakdown="",periodoLbl="",weekOptions="";

  if(state.rep==="semana"){
    // Semanas do ano
    const wks=weeksInYear(state.repYear);
    // Semana corrente default
    const curW=weekOfYear(todayStr);
    const selW=state.repWeek||curW;
    const wkObj=wks.find(w=>w.w===selW)||wks[wks.length-1];
    start=wkObj.start;end=wkObj.end;
    periodoLbl=`${wkObj.label} — ${fmtD(wkObj.start)} a ${fmtD(wkObj.end)}`;
    weekOptions=`<div class="fg"><label>Ano</label><input type="number" id="rep_year" value="${state.repYear}" min="2020" max="2100" style="width:100px"></div>
      <div class="fg"><label>Semana</label><select id="rep_week">${wks.map(w=>`<option value="${w.w}" ${w.w===selW?"selected":""}>${w.label} · ${fmtD(w.start)} a ${fmtD(w.end)}</option>`).join("")}</select></div>`;

    const {ent:entW,sai:saiW}=aggregate(dom,start,end);
    // Movimentação por item na semana
    const movItemW={};
    prodOf(dom).forEach(p=>{
      const eQtd=entW.filter(m=>m.produtoId===p.id).reduce((s,m)=>s+m.qtd,0);
      const sQtd=saiW.filter(m=>m.produtoId===p.id).reduce((s,m)=>s+m.qtd,0);
      if(eQtd||sQtd)movItemW[p.descricao]={ent:eQtd,sai:sQtd};
    });
    const movItemRowsW=Object.entries(movItemW).sort((a,b)=>a[0].localeCompare(b[0],"pt-BR"))
      .map(([k,v])=>`<tr><td>${esc(k)}</td><td class="num qpos">${v.ent?"+"+v.ent:"—"}</td><td class="num qneg">${v.sai?"−"+v.sai:"—"}</td></tr>`).join("")
      || `<tr><td colspan="3"><div class="empty">Sem movimentações.</div></td></tr>`;
    // Itens com saídas na semana
    const porItemW={};
    saiW.forEach(s=>{const p=PRODUTOS.find(x=>x.id===s.produtoId);const k=p?p.descricao:"?";porItemW[k]=(porItemW[k]||0)+s.qtd;});
    const itemRowsW=Object.entries(porItemW).sort((a,b)=>b[1]-a[1]).map(([k,q],i)=>`<tr><td><span style="font-size:11px;color:var(--txt-faint);margin-right:6px">${i+1}°</span>${esc(k)}</td><td class="num"><b>${q}</b></td></tr>`).join("") || `<tr><td colspan="2"><div class="empty">Sem saídas.</div></td></tr>`;
    // Colaboradores ofensores (mais de 1 item igual) — só Safety
    let ofBlock="";
    if(dom==="safety"){
      const colabOfW={};
      saiW.forEach(s=>{
        const p=PRODUTOS.find(x=>x.id===s.produtoId);const item=p?p.descricao:"?";
        if(!colabOfW[s.parte])colabOfW[s.parte]={};
        colabOfW[s.parte][item]=(colabOfW[s.parte][item]||0)+s.qtd;
      });
      const ofensores=[];
      Object.entries(colabOfW).forEach(([c,map])=>{Object.entries(map).forEach(([item,qtd])=>{if(qtd>1)ofensores.push({c,item,qtd});});});
      ofensores.sort((a,b)=>b.qtd-a.qtd);
      const ofRows=ofensores.map(o=>`<tr><td><b>${esc(o.c)}</b></td><td>${esc(o.item)}</td><td class="num qneg">${o.qtd}×</td></tr>`).join("") || `<tr><td colspan="3"><div class="empty">Nenhum ofensor.</div></td></tr>`;
      ofBlock=`<div class="panel"><div class="panel-bar"><h3>Ofensores — +1 item igual</h3></div>
        <div class="scroll-y" style="max-height:300px"><table><thead><tr><th>Colaborador</th><th>Item</th><th class="num">Qtd</th></tr></thead><tbody>${ofRows}</tbody></table></div></div>`;
    }

    breakdown=`
    <div class="panel"><div class="panel-bar"><h3>Movimentação por Item — ${wkObj.label}</h3></div>
      <div class="scroll-y" style="max-height:300px"><table>
        <thead><tr><th>Produto</th><th class="num">Entradas</th><th class="num">Saídas</th></tr></thead>
        <tbody>${movItemRowsW}</tbody>
      </table></div></div>
    <div style="display:grid;grid-template-columns:1fr${dom==="safety"?" 1fr":""};gap:12px">
      <div class="panel"><div class="panel-bar"><h3>Itens com Saídas — ${wkObj.label}</h3></div>
        <div class="scroll-y" style="max-height:280px"><table><thead><tr><th>Produto</th><th class="num">Qtd</th></tr></thead><tbody>${itemRowsW}</tbody></table></div></div>
      ${ofBlock}
    </div>`;

  }else if(state.rep==="mes"){
    const r=monthRange(state.repMonth);start=r.start;end=r.end;
    periodoLbl=`${MESES_FULL[Number(state.repMonth.split("-")[1])-1]} / ${state.repMonth.split("-")[0]}`;
    weekOptions=`<div class="fg"><label>Mês</label><input type="month" id="rep_month" value="${state.repMonth}"></div>`;

    const {ent:entM,sai:saiM}=aggregate(dom,start,end);
    // Movimentação por item no mês
    const movItemM={};
    prodOf(dom).forEach(p=>{
      const eQtd=entM.filter(m=>m.produtoId===p.id).reduce((s,m)=>s+m.qtd,0);
      const sQtd=saiM.filter(m=>m.produtoId===p.id).reduce((s,m)=>s+m.qtd,0);
      if(eQtd||sQtd)movItemM[p.descricao]={ent:eQtd,sai:sQtd};
    });
    const movItemRowsM=Object.entries(movItemM).sort((a,b)=>a[0].localeCompare(b[0],"pt-BR"))
      .map(([k,v])=>`<tr><td>${esc(k)}</td><td class="num qpos">${v.ent?"+"+v.ent:"—"}</td><td class="num qneg">${v.sai?"−"+v.sai:"—"}</td></tr>`).join("")
      || `<tr><td colspan="3"><div class="empty">Sem movimentações.</div></td></tr>`;
    const porItemM={};
    saiM.forEach(s=>{const p=PRODUTOS.find(x=>x.id===s.produtoId);const k=p?p.descricao:"?";porItemM[k]=(porItemM[k]||0)+s.qtd;});
    const top10Items=Object.entries(porItemM).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const itemRowsM=top10Items.map(([k,q],i)=>`<tr><td><span style="font-size:11px;color:var(--txt-faint);margin-right:6px">${i+1}°</span>${esc(k)}</td><td class="num"><b>${q}</b></td></tr>`).join("") || `<tr><td colspan="2"><div class="empty">Sem saídas.</div></td></tr>`;

    const porColabM={};
    saiM.forEach(s=>{if(s.parte)porColabM[s.parte]=(porColabM[s.parte]||0)+s.qtd;});
    const top10Colab=Object.entries(porColabM).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const colabRowsM=top10Colab.map(([k,q],i)=>`<tr><td><span style="font-size:11px;color:var(--txt-faint);margin-right:6px">${i+1}°</span><b>${esc(k)}</b></td><td class="num">${q}</td></tr>`).join("") || `<tr><td colspan="2"><div class="empty">Sem dados.</div></td></tr>`;

    const colabBlockM=dom==="safety"?`<div class="panel"><div class="panel-bar"><h3>Top 10 — Mais Retiradas por Colaborador</h3></div>
        <div class="scroll-y" style="max-height:340px"><table><thead><tr><th>Colaborador</th><th class="num">Itens</th></tr></thead><tbody>${colabRowsM}</tbody></table></div></div>`:"";

    breakdown=`
    <div class="panel"><div class="panel-bar"><h3>Movimentação por Item — ${periodoLbl}</h3></div>
      <div class="scroll-y" style="max-height:300px"><table>
        <thead><tr><th>Produto</th><th class="num">Entradas</th><th class="num">Saídas</th></tr></thead>
        <tbody>${movItemRowsM}</tbody>
      </table></div></div>
    <div style="display:grid;grid-template-columns:1fr${dom==="safety"?" 1fr":""};gap:12px">
      <div class="panel"><div class="panel-bar"><h3>Top 10 — Itens Mais Retirados</h3></div>
        <div class="scroll-y" style="max-height:340px"><table><thead><tr><th>Produto</th><th class="num">Qtd</th></tr></thead><tbody>${itemRowsM}</tbody></table></div></div>
      ${colabBlockM}
    </div>`;

  }else if(state.rep==="ano"){
    const r=yearRange(state.repYear);start=r.start;end=r.end;
    periodoLbl=`Ano ${state.repYear}`;
    weekOptions=`<div class="fg"><label>Ano</label><input type="number" id="rep_year" value="${state.repYear}" min="2020" max="2100" style="width:100px"></div>`;

    // Por item: entradas, saídas e saldo final
    const prodsDom=prodOf(dom);
    const itemAnoRows=prodsDom.map(p=>{
      const entAno=MOVS.filter(m=>m.tipo==="entrada"&&m.produtoId===p.id&&m.data>=start&&m.data<=end).reduce((s,m)=>s+m.qtd,0);
      const saiAno=MOVS.filter(m=>m.tipo==="saida"&&m.produtoId===p.id&&m.data>=start&&m.data<=end).reduce((s,m)=>s+m.qtd,0);
      const saldoFinal=atual(p.id);
      return `<tr>
        <td><b>${esc(p.descricao)}</b></td>
        <td class="num qpos">+${entAno}</td>
        <td class="num qneg">−${saiAno}</td>
        <td class="num" style="font-weight:600;${saldoFinal<=0?"color:var(--red)":"color:var(--green)"}">${saldoFinal}</td>
      </tr>`;
    }).join("") || `<tr><td colspan="4"><div class="empty">Sem produtos.</div></td></tr>`;

    breakdown=`<div class="panel"><div class="panel-bar"><h3>Movimentação Anual por Item — ${state.repYear}</h3></div>
      <div class="scroll-y" style="max-height:480px"><table>
        <thead><tr><th>Produto</th><th class="num">Entradas</th><th class="num">Saídas</th><th class="num">Saldo Final</th></tr></thead>
        <tbody>${itemAnoRows}</tbody>
      </table></div></div>`;

  }else{
    start=state.repStart||today().slice(0,8)+"01";end=state.repEnd||today();
    periodoLbl="Período personalizado";
    weekOptions=`<div class="fg"><label>De</label><input type="date" id="rep_start" value="${start}"></div><div class="fg"><label>Até</label><input type="date" id="rep_end" value="${end}"></div>`;
  }
  _repRange={start,end};

  const {ent,sai,valEnt,qtdSai}=aggregate(dom,start,end);
  const porColab={};sai.forEach(s=>{if(s.parte)porColab[s.parte]=(porColab[s.parte]||0)+s.qtd;});

  return `
  <div class="selbar">
    <div class="fg"><label>Tipo de relatório</label>
      <div class="seg" id="repSeg">${[["semana","Semanal"],["mes","Mensal"],["ano","Anual"],["periodo","Período"]].map(([p,l])=>`<button data-p="${p}" class="${state.rep===p?"active":""}">${l}</button>`).join("")}</div></div>
    ${weekOptions}
    <button class="btn ghost sm" data-act="csv" style="margin-bottom:2px">⤓ CSV</button><button class="btn ghost sm" onclick="backupManual()" style="margin-bottom:2px" title="Backup agora no Google Drive">&#9729; Drive</button><a href="https://drive.google.com/drive/folders/1XxVvU6fE2ozesThx5-pIT0qCOe3AyYj8" target="_blank" class="btn ghost sm" style="margin-bottom:2px;text-decoration:none">&#128194; Abrir Pasta</a>
  </div>
  <div class="stats">
    <div class="stat"><div class="l">${periodoLbl}</div><div class="v" style="font-size:15px">${fmtD(start)} → ${fmtD(end)}</div></div>
    <div class="stat green"><div class="l">Entradas</div><div class="v">${ent.length}<small> lanç.</small></div><div class="m">${brl(valEnt)} em compras</div></div>
    <div class="stat"><div class="l">Saídas</div><div class="v">${sai.length}<small> regs.</small></div><div class="m">${qtdSai} itens</div></div>
    <div class="stat amber"><div class="l">Colaboradores</div><div class="v">${Object.keys(porColab).length}</div><div class="m">atendidos</div></div>
  </div>
  ${breakdown}`;
}

/* ================= WIRE ================= */
function wire(){
  document.querySelectorAll("[data-act]").forEach(b=>b.onclick=()=>act(b.dataset.act));
  if(state.view==="estoque"){
    const ps=document.getElementById("prodSel");if(ps)ps.onchange=()=>{state.sel=ps.value||null;render();};
    document.querySelectorAll("[data-delmov]").forEach(b=>b.onclick=()=>delMov(b.dataset.delmov));
    document.querySelectorAll("[data-editmov]").forEach(b=>b.onclick=()=>editMov(b.dataset.editmov));
  }
  if(state.view==="colaboradores"){
    const cd=document.getElementById("colabDropdown");
    if(cd)cd.onchange=()=>{state.colab=cd.value||null;render();};
    document.querySelectorAll("[data-delmov]").forEach(b=>b.onclick=()=>delMov(b.dataset.delmov));
  }
  if(state.view==="relatorios"){
    document.querySelectorAll("#repSeg button").forEach(b=>b.onclick=()=>{state.rep=b.dataset.p;render();});
    const rm=document.getElementById("rep_month");if(rm)rm.onchange=()=>{state.repMonth=rm.value;render();};
    const ry=document.getElementById("rep_year");if(ry)ry.onchange=()=>{state.repYear=Number(ry.value);render();};
    const rw=document.getElementById("rep_week");if(rw)rw.onchange=()=>{state.repWeek=Number(rw.value);render();};
    const rs=document.getElementById("rep_start");if(rs)rs.onchange=()=>{state.repStart=rs.value;render();};
    const re=document.getElementById("rep_end");if(re)re.onchange=()=>{state.repEnd=re.value;render();};
  }
}

/* ================= ACTIONS ================= */
function act(a){
  if(a==="novoProd")formProduto(null);
  else if(a==="editProd"&&selProd())formProduto(selProd());
  else if(a==="delProd")delProduto();
  else if(a==="entrada"&&selProd())formMov("entrada");
  else if(a==="saida"&&selProd())formMov("saida");
  else if(a==="novaEntrega")formEntrega("");
  else if(a==="csv")exportCSV();
}

/* ---- Produto ---- */
function formProduto(prod){
  const dom=state.dom,isNew=!prod;
  // Safety: sem setor, apenas descrição, unidade, tamanhos, cores
  if(dom==="safety"){
    const cur=prod||{descricao:"",unidade:"UN",tamanhos:[],cores:[]};
    openModal((isNew?"Cadastrar":"Alterar")+" Produto · Safety",`
      <div class="mgrid">
        <div class="mfield full"><label>Descrição (Nome) <span class="req">*</span></label><input id="p_desc" value="${esc(cur.descricao)}" placeholder="Nome do produto/EPI"></div>
        <div class="mfield"><label>Unidade</label><input id="p_un" value="${esc(cur.unidade||"UN")}"></div>
        <div class="mfield full"><label>Tamanhos (separe por vírgula)</label><input id="p_tam" value="${esc((cur.tamanhos||[]).join(", "))}" placeholder="Ex: P, M, G, GG"></div>
        <div class="mfield full"><label>Tipo/Modelo (Cores)</label><input id="p_cor" value="${esc((cur.cores||[]).join(", "))}" placeholder="Ex: Nitrílica, Látex"></div>
      </div>`,
      [{label:"Cancelar",cls:"ghost",act:closeModal},
       {label:"Salvar",cls:"primary",act:async()=>{
         const desc=val("p_desc").trim();if(!desc){toast("Informe a descrição","erro");return;}
         const obj={dom,setor:"Safety",classificacao:"Safety",descricao:desc,unidade:val("p_un").trim()||"UN",codRef:"",
           tamanhos:val("p_tam").split(",").map(s=>s.trim()).filter(Boolean),
           cores:val("p_cor").split(",").map(s=>s.trim()).filter(Boolean)};
         if(isNew){obj.id=uid();PRODUTOS.push(obj);}else Object.assign(prod,obj);
         const saved=await persistProd(isNew?obj:prod,isNew);if(!saved)return;
         if(isNew)state.sel=obj.id;closeModal();toast(isNew?"Produto cadastrado.":"Produto atualizado.","ok");render();
       }}]);
  }else{
    // Insumos: com setor
    const setores=Object.keys(SETORES[dom]);
    const cur=prod||{setor:setores[0],descricao:"",unidade:SETORES[dom][setores[0]].un,tamanhos:[...SETORES[dom][setores[0]].tamanhos],cores:[...SETORES[dom][setores[0]].cores]};
    openModal((isNew?"Cadastrar":"Alterar")+" Produto · Insumos",`
      <div class="mgrid">
        <div class="mfield"><label>Tipo/Modelo <span class="req">*</span></label><select id="p_setor">${setores.map(s=>`<option ${cur.setor===s?"selected":""}>${s}</option>`).join("")}</select></div>
        <div class="mfield"><label>Unidade</label><input id="p_un" value="${esc(cur.unidade)}"></div>
        <div class="mfield full"><label>Descrição <span class="req">*</span></label><input id="p_desc" value="${esc(cur.descricao)}" placeholder="Nome do produto"></div>
        <div class="mfield full"><label>Tamanhos (separe por vírgula)</label><input id="p_tam" value="${esc((cur.tamanhos||[]).join(", "))}" placeholder="Ex: A4, A3"></div>
        <div class="mfield full"><label>Cores (separe por vírgula)</label><input id="p_cor" value="${esc((cur.cores||[]).join(", "))}" placeholder="Ex: Branco, Azul"></div>
      </div>`,
      [{label:"Cancelar",cls:"ghost",act:closeModal},
       {label:"Salvar",cls:"primary",act:async()=>{
         const desc=val("p_desc").trim();if(!desc){toast("Informe a descrição","erro");return;}
         const setor=val("p_setor");
         const obj={dom,setor,classificacao:setor,descricao:desc,unidade:val("p_un").trim()||"UN",codRef:"",
           tamanhos:val("p_tam").split(",").map(s=>s.trim()).filter(Boolean),
           cores:val("p_cor").split(",").map(s=>s.trim()).filter(Boolean)};
         if(isNew){obj.id=uid();PRODUTOS.push(obj);state.sel=obj.id;}else Object.assign(prod,obj);
         await persistProd();closeModal();toast(isNew?"Produto cadastrado.":"Produto atualizado.","ok");render();
       }}]);
    setTimeout(()=>{const ss=document.getElementById("p_setor");if(ss)ss.onchange=()=>{const c=SETORES[dom][ss.value];
      document.getElementById("p_un").value=c.un;document.getElementById("p_tam").value=c.tamanhos.join(", ");document.getElementById("p_cor").value=c.cores.join(", ");};},0);
  }
}
async function delProduto(){
  const p=selProd();if(!p)return;const n=movOf(p.id).length;
  const ok=await confirmModal("Excluir produto",`Excluir <b>${esc(p.descricao)}</b>?${n?` Também remove <b>${n}</b> movimentação(ões).`:""}`,"Excluir");
  if(!ok)return;
  const r=await deleteProdApi(p.id);if(!r)return;
  PRODUTOS=PRODUTOS.filter(x=>x.id!==p.id);MOVS=MOVS.filter(m=>m.produtoId!==p.id);
  state.sel=null;toast("Produto excluído.","ok");render();
}

/* ---- Movimentação (Entrada / Saída-insumos) ---- */
function formMov(tipo){
  const p=selProd();if(!p)return;const isSai=tipo==="saida";
  const tamOpts=(p.tamanhos&&p.tamanhos.length)?`<div class="mfield"><label>Tamanho <span class="req">*</span></label><select id="m_tam">${isSai?'<option value="">—</option>':''}${p.tamanhos.map(t=>`<option>${esc(t)}</option>`).join("")}</select></div>`:"";
  const corOpts=(p.cores&&p.cores.length)?`<div class="mfield"><label>Cor/Tipo <span class="req">*</span></label><select id="m_cor">${isSai?'<option value="">—</option>':''}${p.cores.map(c=>`<option>${esc(c)}</option>`).join("")}</select></div>`:"";
  const colabList=colabListaAtivos(state.dom);
  let body=`<div id="movAlert"></div><div class="mgrid"><div class="mfield"><label>Data <span class="req">*</span></label><input type="date" id="m_data" value="${today()}"></div>`;
  body+=isSai?`<div class="mfield"><label>Colaborador (recebe) <span class="req">*</span></label><select id="m_parte"><option value="">— selecione —</option>${colabList.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("")}</select></div>`
              :`<div class="mfield"><label>Fornecedor</label><input id="m_parte" placeholder="Fornecedor / origem"></div>`;
  body+=tamOpts+corOpts+`<div class="mfield"><label>Quantidade <span class="req">*</span></label><input type="number" id="m_qtd" min="1" step="1" value="1"></div>`;
  body+=isSai?`<div class="mfield"><label>Liberado por <span class="req">*</span></label><input id="m_lib" placeholder="Responsável"></div><div class="mfield"><label>Disponível</label><input id="m_disp" readonly value="—"></div>`
              :`<div class="mfield"><label>Custo unitário (R$)</label><input type="number" id="m_cu" min="0" step="0.01" placeholder="0,00"></div><div class="mfield"><label>Usuário</label><input id="m_user" placeholder="Quem lança"></div>`;
  body+=`<div class="mfield full"><label>Observações</label><input id="m_obs" placeholder="${isSai?"Ex: troca…":"Ex: nota fiscal, lote…"}"></div></div>`;
  openModal((isSai?"Saída":"Entrada")+" · "+esc(p.descricao),body,
    [{label:"Cancelar",cls:"ghost",act:closeModal},{label:isSai?"Registrar Saída":"Registrar Entrada",cls:isSai?"primary":"green",act:()=>submitMov(tipo)}]);
  setTimeout(()=>{
    const upd=()=>{if(isSai){const d=document.getElementById("m_disp");if(d)d.value=saldoVar(p.id,val("m_tam"),val("m_cor"));}chk();};
    ["m_tam","m_cor"].forEach(id=>{const el=document.getElementById(id);if(el)el.onchange=upd;});
    if(isSai){const pe=document.getElementById("m_parte"),da=document.getElementById("m_data");if(pe)pe.onchange=chk;if(da)da.onchange=chk;}
    upd();
    function chk(){const box=document.getElementById("movAlert");if(!box)return;box.innerHTML="";if(!isSai)return;
      const parte=val("m_parte").trim(),data=val("m_data");if(!parte)return;
      const prev=MOVS.filter(m=>m.tipo==="saida"&&m.produtoId===p.id&&m.parte.trim().toLowerCase()===parte.toLowerCase()&&m.data<=data).sort((a,b)=>b.data>a.data?1:-1)[0];
      if(prev){const d=days(prev.data,data);if(d>=0&&d<ALERTA_DIAS)box.innerHTML=`<div class="alert-line">⚠️ <b>Retirada recente.</b> ${esc(parte)} já retirou <b>${esc(p.descricao)}</b> em <b>${fmtD(prev.data)}</b> (há ${d} dia${d===1?"":"s"}). Intervalo inferior a ${ALERTA_DIAS} dias.</div>`;}}
  },0);
}
async function submitMov(tipo){
  const p=selProd();if(!p)return;const isSai=tipo==="saida";
  const data=val("m_data"),qtd=Number(val("m_qtd")),parte=val("m_parte").trim();
  const tam=(p.tamanhos&&p.tamanhos.length)?val("m_tam"):"";
  const cor=(p.cores&&p.cores.length)?val("m_cor"):"";
  if(!data||!qtd||qtd<=0){toast("Informe data e quantidade","erro");return;}
  if(p.tamanhos&&p.tamanhos.length&&!tam){toast("Selecione o tamanho","erro");return;}
  if(p.cores&&p.cores.length&&!cor){toast("Selecione a cor/tipo","erro");return;}
  if(isSai){
    const lib=val("m_lib").trim();if(!parte||!lib){toast("Colaborador e liberado por obrigatórios","erro");return;}
    const saldo=saldoVar(p.id,tam,cor);if(qtd>saldo){toast(`Estoque insuficiente. Disponível: ${saldo}.`,"erro");return;}
    const prev=MOVS.filter(m=>m.tipo==="saida"&&m.produtoId===p.id&&m.parte.trim().toLowerCase()===parte.toLowerCase()&&m.data<=data).sort((a,b)=>b.data>a.data?1:-1)[0];
    if(prev){const d=days(prev.data,data);if(d>=0&&d<ALERTA_DIAS){const ok=await confirmModal("Retirada em intervalo curto",`<b>${esc(parte)}</b> retirou <b>${esc(p.descricao)}</b> em <b>${fmtD(prev.data)}</b> (há ${d} dia${d===1?"":"s"}). Registrar mesmo assim?`,"Registrar");if(!ok)return;}}
    var novaMov={id:uid(),_t:Date.now(),produtoId:p.id,dom:p.dom,tipo:"saida",data,qtd,tamanho:tam,cor,parte,liberadoPor:lib,obs:val("m_obs").trim()};
    const r_s=await persistMov(novaMov);if(!r_s)return;
    MOVS.push(novaMov);
    closeModal();toast(`Saída: ${qtd}× ${p.descricao} → ${parte}`,"ok");render();
  }else{
    var novaEnt={id:uid(),_t:Date.now(),produtoId:p.id,dom:p.dom,tipo:"entrada",data,qtd,tamanho:tam,cor,parte:parte||"—",custoUnit:Number(val("m_cu"))||0,usuario:val("m_user").trim(),obs:val("m_obs").trim()};
    const r_e=await persistMov(novaEnt);if(!r_e)return;
    MOVS.push(novaEnt);
    closeModal();toast(`Entrada: ${qtd}× ${p.descricao}`,"ok");render();
  }
}

/* ── helper: barra de progresso wizard ── */
function _wz_steps(ativo){
  var defs=[["1","Dados"],["2","PIN"],["3","Foto"],["4","Assinatura"]];
  var html='<div style="display:flex;gap:8px;margin-bottom:16px">';
  for(var i=0;i<defs.length;i++){
    var idx=i+1, n=defs[i][0], l=defs[i][1];
    var bg,col,lbl;
    if(idx<ativo){bg="var(--green)";col="#fff";lbl="&#10003; "+l;}
    else if(idx===ativo){bg="var(--blue)";col="#fff";lbl=n+". "+l;}
    else{bg="#eef1f5";col="var(--txt-faint)";lbl=n+". "+l;}
    html+='<div style="flex:1;text-align:center;padding:6px 0;border-radius:6px;font-size:11px;font-weight:700;background:'+bg+';color:'+col+';letter-spacing:.05em">'+lbl+'</div>';
  }
  return html+'</div>';
}

function _wz_step1(prods,prefColab){

  }

  for(var j=0;j<prods.length;j++){

  }
  var body=_wz_steps(1)
    +'<div id="movAlert"></div>'
    +'<div class="mgrid">'
    +'<div class="mfield"><label>Data <span class="req">*</span></label><input type="date" id="ew_data" value="'+today()+'"></div>'
    +'<div class="mfield"><label>Liberado por <span class="req">*</span></label><input id="ew_lib" placeholder="Respons&aacute;vel pela entrega"></div>'
    +'<div class="mfield full"><label>Colaborador (recebe) <span class="req">*</span></label><select id="ew_colab">'+colabOpts+'</select></div>'
    +'<div class="mfield full"><label>EPI / Produto <span class="req">*</span></label><select id="ew_prod">'+prodOpts+'</select></div>'
    +'<div class="mfield"><label>Tamanho</label><select id="ew_tam"><option value="">&#8212;</option></select></div>'
    +'<div class="mfield"><label>Dispon&iacute;vel</label><input id="ew_disp" readonly value="&#8212;"></div>'
    +'<div class="mfield"><label>Quantidade <span class="req">*</span></label><input type="number" id="ew_qtd" min="1" step="1" value="1"></div>'
    +'<div class="mfield full"><label>Observa&ccedil;&otilde;es</label><input id="ew_obs" placeholder="Ex: troca, EPI danificado&#8230;"></div>'
    +'</div>';
  openModal("Nova Entrega de EPI \u2014 Etapa 1 de 4",body,[
    {label:"Cancelar",cls:"ghost",act:function(){closeModal();}},
    {label:"Pr&oacute;ximo: PIN \u2192",cls:"primary",act:_wz_validarDados}
  ]);
  setTimeout(function(){
    var ps=document.getElementById("ew_prod"),
        ts=document.getElementById("ew_tam"),
        disp=document.getElementById("ew_disp"),
        cp=document.getElementById("ew_colab"),
        da=document.getElementById("ew_data");
    function fill(){
      var pr=PRODUTOS.find(function(x){return x.id===ps.value;});
      ts.innerHTML='<option value="">&#8212;</option>';
      if(pr&&pr.tamanhos&&pr.tamanhos.length){
        pr.tamanhos.forEach(function(t){ts.innerHTML+='<option>'+esc(t)+'</option>';});
      }
      upd();
    }
    function upd(){
      var pr=PRODUTOS.find(function(x){return x.id===ps.value;});
      disp.value=pr?saldoVar(pr.id,ts.value,""):"&#8212;";
      chk();
    }
    function chk(){
      var box=document.getElementById("movAlert");
      if(!box)return;
      box.innerHTML="";
      var pr=PRODUTOS.find(function(x){return x.id===ps.value;});
      var parte=(cp?cp.value:"").trim(), data=da?da.value:"";
      if(!pr||!parte)return;
      var prev=MOVS.filter(function(m){
        return m.tipo==="saida"&&m.produtoId===pr.id&&m.parte.trim().toLowerCase()===parte.toLowerCase()&&m.data<=data;
      }).sort(function(a,b){return b.data>a.data?1:-1;})[0];
      if(prev){
        var dd=days(prev.data,data);
        if(dd>=0&&dd<ALERTA_DIAS){

        }
      }
    }
    if(ps)ps.onchange=fill;
    if(ts)ts.onchange=upd;
    if(cp)cp.onchange=chk;
    if(da)da.onchange=chk;
  },0);
}

  var tam=((document.getElementById("ew_tam")||{}).value)||"";

async function _wz_validarPin(){
  var nome=EPI_WZ.dados.colab;
  var pinEl=document.getElementById("wz_pin");
  var pin=pinEl?pinEl.value:"";
  var err=document.getElementById("pin_err");
  if(!/^\d{4}$/.test(pin)){if(err)err.textContent="PIN deve ter exatamente 4 d\u00edgitos.";return;}
  if(!EPI_WZ._pinCache){
    var pin2El=document.getElementById("wz_pin2");
    var pin2=pin2El?pin2El.value:"";
    if(pin!==pin2){if(err)err.textContent="Os PINs n\u00e3o coincidem. Tente novamente.";return;}
    // Cadastrar PIN via API
    const rcad=await api("savePin",{nome,pin},true);
    if(!rcad.ok){if(err)err.textContent="Erro ao salvar PIN.";return;}
    toast("PIN cadastrado para "+nome,"ok");
  }else{
    if(EPI_WZ._pinCache!==pin){
      if(err)err.textContent="PIN incorreto. Tente novamente.";
      if(pinEl){pinEl.value="";pinEl.focus();}
      return;
    }
  }
  EPI_WZ.pinOk=true;
  _wz_step3();
}

function _wz_initCanvas(){
  var canvas=document.getElementById("sig_canvas");if(!canvas)return;
  var rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=Math.max(rect.width-4,200);canvas.height=180;
  var ctx=canvas.getContext("2d");
  ctx.fillStyle="#fafbfd";ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="#1d2733";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
  var drawing=false,lx=0,ly=0;
  function getPos(e){
    var r=canvas.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
  }
  canvas.addEventListener("mousedown",function(e){drawing=true;var p=getPos(e);lx=p.x;ly=p.y;});
  canvas.addEventListener("mousemove",function(e){if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;});
  canvas.addEventListener("mouseup",function(){drawing=false;});
  canvas.addEventListener("mouseleave",function(){drawing=false;});
  canvas.addEventListener("touchstart",function(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener("touchmove",function(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener("touchend",function(){drawing=false;});
}
function _wz_limparAssinatura(){
  var c=document.getElementById("sig_canvas");if(!c)return;
  var ctx=c.getContext("2d");ctx.fillStyle="#fafbfd";ctx.fillRect(0,0,c.width,c.height);
  EPI_WZ.assinDataUrl=null;
}
function _wz_assinVazia(){
  var c=document.getElementById("sig_canvas");if(!c)return true;
  var d=c.getContext("2d").getImageData(0,0,c.width,c.height).data;
  for(var i=0;i<d.length;i+=4){if(d[i]<240||d[i+1]<240||d[i+2]<240)return false;}
  return true;
}
async function _wz_finalizar(){
  if(_wz_assinVazia()){var err=document.getElementById("sig_err");if(err)err.textContent="Por favor, assine antes de confirmar.";return;}
  var c=document.getElementById("sig_canvas");
  EPI_WZ.assinDataUrl=c?c.toDataURL("image/png"):null;
  var d=EPI_WZ.dados,p=PRODUTOS.find(function(x){return x.id===d.prod;});
  var wzMov={id:uid(),_t:Date.now(),produtoId:p.id,dom:"safety",tipo:"saida",data:d.data,qtd:d.qtd,tamanho:d.tam,cor:"",parte:d.colab,liberadoPor:d.lib,obs:d.obs,temRecibo:true};
  const r_w=await persistMov(wzMov);if(!r_w){toast("Erro ao salvar entrega","erro");return;}
  MOVS.push(wzMov);
  closeModal();
  toast("Entrega registrada: "+d.qtd+"× "+p.descricao+" → "+d.colab,"ok");
  // Gerar PDF e salvar no Drive em paralelo
  var fotoSnap=EPI_WZ.fotoDataUrl, assinSnap=EPI_WZ.assinDataUrl;
  await _wz_gerarPDF(d,p,fotoSnap,assinSnap);
  // Sincronizar com Google Sheets
  var movNovo=MOVS[MOVS.length-1];
  driveSyncSheet(movNovo,p).catch(function(){});
  state.dom="safety";state.view="colaboradores";state.colab=d.colab;render();
}

/* Reemitir recibo a partir de movimentação existente (sem foto/assinatura em memória) */
async function reemitirRecibo(movId){
  var mv=MOVS.find(function(x){return x.id===movId;});
  if(!mv){toast("Movimentação não encontrada","erro");return;}
  var p=PRODUTOS.find(function(x){return x.id===mv.produtoId;});
  if(!p){toast("Produto não encontrado","erro");return;}
  var d={colab:mv.parte,prod:mv.produtoId,qtd:mv.qtd,lib:mv.liberadoPor||"",data:mv.data,tam:mv.tamanho||"",obs:mv.obs||""};
  await _wz_gerarPDF(d,p,null,null);
}

async function delMov(id){const ok=await confirmModal("Excluir registro","Remover esta movimentação? O saldo será recalculado.","Excluir");if(!ok)return;
  const r=await deleteMovApi(id);if(!r)return;
  MOVS=MOVS.filter(m=>m.id!==id);render();}

function editMov(id){
  const mv=MOVS.find(m=>m.id===id);if(!mv||mv.tipo!=="entrada")return;
  const p=PRODUTOS.find(x=>x.id===mv.produtoId);if(!p)return;
  const tamOpts=(p.tamanhos&&p.tamanhos.length)?`<div class="mfield"><label>Tamanho</label><select id="em_tam">${p.tamanhos.map(t=>`<option ${mv.tamanho===t?"selected":""}>${esc(t)}</option>`).join("")}</select></div>`:"";
  const corOpts=(p.cores&&p.cores.length)?`<div class="mfield"><label>Cor/Tipo</label><select id="em_cor">${p.cores.map(c=>`<option ${mv.cor===c?"selected":""}>${esc(c)}</option>`).join("")}</select></div>`:"";
  const body=`<div class="mgrid">
    <div class="mfield"><label>Data <span class="req">*</span></label><input type="date" id="em_data" value="${mv.data}"></div>
    <div class="mfield"><label>Fornecedor</label><input id="em_parte" value="${esc(mv.parte||"")}" placeholder="Fornecedor / origem"></div>
    ${tamOpts}${corOpts}
    <div class="mfield"><label>Quantidade <span class="req">*</span></label><input type="number" id="em_qtd" min="1" step="1" value="${mv.qtd}"></div>
    <div class="mfield"><label>Custo unitário (R$)</label><input type="number" id="em_cu" min="0" step="0.01" value="${mv.custoUnit||0}"></div>
    <div class="mfield"><label>Usuário</label><input id="em_user" value="${esc(mv.usuario||"")}"></div>
    <div class="mfield full"><label>Observações</label><input id="em_obs" value="${esc(mv.obs||"")}"></div>
  </div>`;
  openModal("Editar Entrada · "+esc(p.descricao),body,[
    {label:"Cancelar",cls:"ghost",act:closeModal},
    {label:"Salvar Alterações",cls:"primary",act:async()=>{
      const qtd=Number(document.getElementById("em_qtd")?.value);
      const data=document.getElementById("em_data")?.value;
      if(!data||!qtd||qtd<=0){toast("Informe data e quantidade","erro");return;}
      mv.data=data;
      mv.qtd=qtd;
      mv.parte=document.getElementById("em_parte")?.value.trim()||"—";
      mv.custoUnit=Number(document.getElementById("em_cu")?.value)||0;
      mv.usuario=document.getElementById("em_user")?.value.trim()||"";
      mv.obs=document.getElementById("em_obs")?.value.trim()||"";
      if(p.tamanhos&&p.tamanhos.length){const t=document.getElementById("em_tam");if(t)mv.tamanho=t.value;}
      if(p.cores&&p.cores.length){const c=document.getElementById("em_cor");if(c)mv.cor=c.value;}
      const r_u=await updateMovApi(mv);if(!r_u)return;closeModal();toast("Entrada atualizada.","ok");render();
    }}]);
}

/* ---- CSV ---- */
function exportCSV(){const dom=state.dom,{start,end}=_repRange;
  const ms=MOVS.filter(m=>m.dom===dom&&m.data>=start&&m.data<=end).sort((a,b)=>a.data>b.data?1:-1);
  let csv="Data;Tipo;Produto;Tamanho;Cor;Quantidade;Colaborador/Fornecedor;Liberado por;Custo unit;Observacoes\n";
  ms.forEach(m=>{const p=PRODUTOS.find(x=>x.id===m.produtoId);csv+=`${m.data};${m.tipo};${p?p.descricao:"?"};${m.tamanho||""};${m.cor||""};${m.qtd};${m.parte||""};${m.liberadoPor||""};${m.custoUnit||""};${(m.obs||"").replace(/;/g,",")}\n`;});
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`relatorio_${dom}_${start}_${end}.csv`;a.click();toast("CSV exportado.","ok");}

/* ================= MODAL / TOAST ================= */
function openModal(title,body,buttons){const m=document.getElementById("modal");
  m.innerHTML=`<div class="modal-head"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div><div class="modal-body">${body}</div><div class="modal-foot">${buttons.map((b,i)=>`<button class="btn ${b.cls}" data-mb="${i}">${b.label}</button>`).join("")}</div>`;
  document.getElementById("overlay").classList.add("show");m.querySelectorAll("[data-mb]").forEach((btn,i)=>btn.onclick=buttons[i].act);}
function closeModal(){document.getElementById("overlay").classList.remove("show");}
function confirmModal(t,msg,cl){return new Promise(res=>{openModal(t,`<div style="font-size:14px;line-height:1.55">${msg}</div>`,[{label:"Cancelar",cls:"ghost",act:()=>{closeModal();res(false);}},{label:cl||"Confirmar",cls:"danger",act:()=>{closeModal();res(true);}}]);});}
document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
function toast(msg,type){const t=document.createElement("div");t.className="toast "+(type||"");t.textContent=msg;document.getElementById("toasts").appendChild(t);setTimeout(()=>{t.style.transition=".3s";t.style.opacity="0";t.style.transform="translateX(40px)";setTimeout(()=>t.remove(),300);},3000);}

/* ================= BOOT ================= */
document.querySelectorAll(".dom-tab").forEach(b=>b.onclick=()=>{state.dom=b.dataset.dom;state.sel=null;state.colab=null;state.histColab=null;render();});
document.querySelectorAll("#menu button").forEach(b=>b.onclick=()=>{state.view=b.dataset.view;state.colab=null;state.histColab=null;render();});
document.addEventListener("keydown",e=>{
  if(state.view!=="estoque"||!selProd()||document.getElementById("overlay").classList.contains("show"))return;
  if(e.key==="F5"){e.preventDefault();formMov("entrada");}
  if(e.key==="F6"&&state.dom==="insumos"){e.preventDefault();formMov("saida");}
});
setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});},1000);
(async()=>{
  // Mostrar botão Usuários para admins após login
  window._postLoginHook=function(){
    const u=getUser();
    const mu=document.getElementById("menuUsuarios");
    if(mu)mu.style.display=u&&u.nivel==="admin"?"":"none";
  };
  // Verificar se já há sessão válida (token em sessionStorage)
  const token=getToken();
  if(token){
    // Testar token fazendo getAll
    const loadOk = await loadAll();
    if(loadOk){
      const u=getUser();
      document.getElementById("app").style.display="";
      var saveEl=document.getElementById("save");
      if(saveEl&&u)saveEl.textContent=u.nome||u.email;
      const t=today();
      state.view="estoque";state.sel=null;state.colab=null;
      state.repMonth=t.slice(0,7);state.repYear=Number(t.slice(0,4));
      state.repWeek=weekOfYear(t);state.repStart=t.slice(0,8)+"01";state.repEnd=t;
      if(window._postLoginHook)window._postLoginHook();
      await loadPins();
      render();return;
    }else{clearSession();}
  }
  showLogin();
})();
